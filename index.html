<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chọn Skin</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
}

input{
padding:12px;
width:200px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
background:red;
color:white;
border:none;
border-radius:8px;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
margin-top:20px;
}

.box{
width:300px;
height:170px;
border:3px solid #aaa;
border-radius:12px;
overflow:hidden;
position:relative;
cursor:pointer;
}

.box img{
width:100%;
height:100%;
object-fit:cover;
}

.selected{
border:3px solid yellow;
box-shadow:0 0 20px yellow;
}

.label{
position:absolute;
top:10px;
right:10px;
background:yellow;
color:black;
padding:5px 10px;
border-radius:6px;
display:none;
font-weight:bold;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
color:black;
padding:25px;
border-radius:10px;
font-size:20px;
}

</style>
</head>

<body>

<h2>NHẬP ID</h2>

<input type="text" placeholder="Nhập ID">
<button onclick="xacnhan()">Xác nhận</button>

<div class="container">

<div class="box" onclick="chon(this)">
<div class="label">SD</div>
<img src="https://i.postimg.cc/J43y3Xvz/images-(1).jpg">
</div>

<div class="box" onclick="chon(this)">
<div class="label">SELECTED</div>
<img src="https://i.postimg.cc/q74zZ7fq/images.jpg">
</div>

<div class="box" onclick="chon(this)">
<div class="label">SELECTED</div>
<img src="https://i.postimg.cc/4NyvBBv4/Anh-skin-sung-free-fire-lv7-ngau.jpg">
</div>

</div>

<div class="popup" id="popup">
<div class="popup-box">
SUCCESS
<br><br>
<button onclick="dong()">OK</button>
</div>
</div>

<script>

function chon(box){

let tatca = document.querySelectorAll(".box");

tatca.forEach(function(b){
b.classList.remove("selected");
b.querySelector(".label").style.display="none";
});

box.classList.add("selected");
box.querySelector(".label").style.display="block";

}

function xacnhan(){
document.getElementById("popup").style.display="flex";
}

function dong(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
  </html>
